<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="steady99">
  <meta name="theme-color" content="#0f0f23">
  <title>steady99</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Do+Hyeon&family=Dongle:wght@400;700&family=Gowun+Batang:wght@400;700&family=Gowun+Dodum&family=Nanum+Brush+Script&family=Nanum+Pen+Script&family=Noto+Sans+KR:wght@400;700&family=Noto+Serif+KR:wght@700&family=Song+Myung&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <main id="app">
    <div class="layer active" id="layer-a">
      <p class="quote-text"></p>
      <span class="quote-author"></span>
    </div>
    <div class="layer" id="layer-b">
      <p class="quote-text"></p>
      <span class="quote-author"></span>
    </div>
  </main>

  <!-- 즐겨찾기 하트 애니메이션 -->
  <div id="heart-anim" class="heart-anim" aria-hidden="true">♥</div>
  <div id="heart-remove-anim" class="heart-anim heart-remove" aria-hidden="true">♡</div>

  <!-- 명언 카운터 -->
  <div id="quote-counter" class="quote-counter" style="display:none;"></div>

  <!-- 시계 표시 -->
  <div id="clock-display" class="clock-display" style="display:none;"></div>

  <!-- 공유 버튼 -->
  <button id="share-btn" class="share-btn" style="display:none;" aria-label="공유">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M18 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6zM6 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6zM18 22a3 3 0 1 0 0-6 3 3 0 0 0 0 6zM8.59 13.51l6.83 3.98M15.41 6.51l-6.82 3.98"/>
    </svg>
  </button>

  <!-- 토스트 알림 -->
  <div id="toast" class="toast" aria-live="polite"></div>

  <!-- 설정 버튼 (톱니바퀴) -->
  <button id="settings-btn" class="settings-btn" aria-label="설정">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <circle cx="12" cy="12" r="2"/>
      <path d="M12 1v6M12 17v6M4.22 4.22l4.24 4.24M15.54 15.54l4.24 4.24M1 12h6M17 12h6M4.22 19.78l4.24-4.24M15.54 8.46l4.24-4.24"/>
    </svg>
  </button>

  <!-- 설정 패널 -->
  <div id="settings-panel" class="settings-panel">
    <div class="settings-content">
      <div class="settings-header">
        <h2>설정</h2>
        <button id="settings-close" class="settings-close">✕</button>
      </div>

      <!-- 카테고리 필터 (맨 위로 이동) -->
      <div class="settings-group">
        <label>카테고리</label>
        <div class="category-toggles" id="category-toggles">
          <!-- 동적으로 생성됨 -->
        </div>
      </div>

      <!-- 자동 전환 속도 -->
      <div class="settings-group">
        <label>자동 전환 속도</label>
        <div class="speed-buttons">
          <button data-speed="5000" class="speed-btn">5초</button>
          <button data-speed="10000" class="speed-btn">10초</button>
          <button data-speed="30000" class="speed-btn">30초</button>
          <button data-speed="60000" class="speed-btn active">1분</button>
          <button data-speed="300000" class="speed-btn">5분</button>
        </div>
      </div>

      <!-- 시계 표시 토글 -->
      <div class="settings-group">
        <label>시계 표시</label>
        <div class="toggle-buttons">
          <button id="clock-toggle" class="toggle-btn" data-setting="clock">OFF</button>
        </div>
      </div>

      <!-- 명언 카운터 토글 -->
      <div class="settings-group">
        <label>명언 카운터</label>
        <div class="toggle-buttons">
          <button id="counter-toggle" class="toggle-btn" data-setting="counter">OFF</button>
        </div>
      </div>

      <!-- 즐겨찾기만 보기 토글 -->
      <div class="settings-group">
        <label>즐겨찾기만 보기</label>
        <div class="toggle-buttons">
          <button id="favorites-toggle" class="toggle-btn" data-setting="favorites">OFF</button>
        </div>
      </div>

      <!-- 공유 버튼 표시 토글 -->
      <div class="settings-group">
        <label>공유 버튼</label>
        <div class="toggle-buttons">
          <button id="share-toggle" class="toggle-btn" data-setting="share">OFF</button>
        </div>
      </div>

      <!-- 전환 효과 -->
      <div class="settings-group">
        <label>전환 효과</label>
        <div class="transition-buttons">
          <button data-transition="fade" class="transition-btn active">페이드</button>
          <button data-transition="slide" class="transition-btn">슬라이드</button>
          <button data-transition="zoom" class="transition-btn">줌</button>
        </div>
      </div>

      <!-- 글씨체 -->
      <div class="settings-group">
        <label>글씨체</label>
        <div class="font-buttons">
          <button data-font="__random__" class="font-btn font-random" id="font-random-btn">🔀 랜덤 자동 변환</button>
          <button data-font="Noto Sans KR" class="font-btn active">기본 (고딕)</button>
          <button data-font="Noto Serif KR" class="font-btn" style="font-family:'Noto Serif KR',serif">세리프 명조</button>
          <button data-font="Black Han Sans" class="font-btn" style="font-family:'Black Han Sans',sans-serif">블랙 한산스</button>
          <button data-font="Do Hyeon" class="font-btn" style="font-family:'Do Hyeon',sans-serif">도현</button>
          <button data-font="Nanum Brush Script" class="font-btn" style="font-family:'Nanum Brush Script',cursive">나눔 붓글씨</button>
          <button data-font="Nanum Pen Script" class="font-btn" style="font-family:'Nanum Pen Script',cursive">나눔 펜글씨</button>
          <button data-font="Gowun Batang" class="font-btn" style="font-family:'Gowun Batang',serif">고운 바탕</button>
          <button data-font="Dongle" class="font-btn" style="font-family:'Dongle',sans-serif">동글</button>
          <button data-font="Gowun Dodum" class="font-btn" style="font-family:'Gowun Dodum',sans-serif">고운 도둠</button>
          <button data-font="Song Myung" class="font-btn" style="font-family:'Song Myung',serif">송명</button>
        </div>
      </div>

      <!-- 배경색 -->
      <div class="settings-group">
        <label>배경색</label>
        <div class="color-buttons bg-colors">
          <button class="color-btn active" data-color="#000000" style="background:#000000;" title="검정"></button>
          <button class="color-btn" data-color="#ffffff" style="background:#ffffff; border:1px solid #ccc;" title="흰색"></button>
          <button class="color-btn" data-color="#001a4d" style="background:#001a4d;" title="네이비"></button>
          <button class="color-btn" data-color="#1a3a2a" style="background:#1a3a2a;" title="다크그린"></button>
          <button class="color-btn" data-color="#3d1a2a" style="background:#3d1a2a;" title="와인"></button>
          <button class="color-btn" data-color="#2a2a2a" style="background:#2a2a2a;" title="차콜"></button>
          <button class="color-btn" data-color="#1a2a3d" style="background:#1a2a3d;" title="슬레이트"></button>
          <button class="color-btn" data-color="#2a1a1a" style="background:#2a1a1a;" title="브라운"></button>
        </div>
      </div>

      <!-- 그라디언트 배경 -->
      <div class="settings-group">
        <label>그라디언트 배경</label>
        <div class="gradient-buttons" id="gradient-buttons">
          <button class="gradient-btn active" data-gradient="none" title="없음">없음</button>
          <button class="gradient-btn" data-gradient="neon" style="background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);" title="네온 그라디언트"></button>
          <button class="gradient-btn" data-gradient="aurora" style="background:linear-gradient(135deg,#0a1628,#1a4a3a,#0a3d6b);" title="오로라"></button>
          <button class="gradient-btn" data-gradient="sunset" style="background:linear-gradient(135deg,#1a0a2e,#3d1a1a,#4a2a0a);" title="선셋"></button>
          <button class="gradient-btn" data-gradient="ocean" style="background:linear-gradient(135deg,#0a0a2e,#0a2a4a,#0a1a3d);" title="오션"></button>
          <button class="gradient-btn" data-gradient="forest" style="background:linear-gradient(135deg,#0a1a0a,#1a2a1a,#0a2a1a);" title="포레스트"></button>
          <button class="gradient-btn" data-gradient="midnight" style="background:linear-gradient(135deg,#020111,#1a1a2e,#16222a);" title="미드나잇"></button>
          <button class="gradient-btn" data-gradient="wine" style="background:linear-gradient(135deg,#1a0a0a,#3d1a2a,#2a0a1a);" title="와인"></button>
        </div>
      </div>

      <!-- 글씨색 -->
      <div class="settings-group">
        <label>글씨색</label>
        <div class="color-buttons text-colors">
          <button class="color-btn active" data-color="#ffffff" style="background:#ffffff; border:1px solid #ccc;" title="흰색"></button>
          <button class="color-btn" data-color="#ffff00" style="background:#ffff00;" title="노랑"></button>
          <button class="color-btn" data-color="#87ceeb" style="background:#87ceeb;" title="하늘색"></button>
          <button class="color-btn" data-color="#7fffd4" style="background:#7fffd4;" title="민트"></button>
          <button class="color-btn" data-color="#ffb6d9" style="background:#ffb6d9;" title="핑크"></button>
          <button class="color-btn" data-color="#ffd700" style="background:#ffd700;" title="금색"></button>
          <button class="color-btn" data-color="#ff6b6b" style="background:#ff6b6b;" title="빨강"></button>
          <button class="color-btn" data-color="#c0c0c0" style="background:#c0c0c0; border:1px solid #999;" title="은색"></button>
        </div>
      </div>

      <!-- 글씨 크기 -->
      <div class="settings-group">
        <label>글씨 크기</label>
        <div class="size-buttons">
          <button data-size="3" class="size-btn">작게</button>
          <button data-size="5" class="size-btn active">보통</button>
          <button data-size="7" class="size-btn">크게</button>
          <button data-size="9" class="size-btn">아주크게</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 설정 패널 배경 (backdrop) -->
  <div id="settings-backdrop" class="settings-backdrop"></div>

  <script src="js/quotes.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
