<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>Steady99 - 동기부여 & 투자 명언</title>
  
  <!-- 구글 폰트 로드 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&family=Noto+Serif+KR:wght@700&family=Black+Han+Sans&family=Do+Hyeon&family=Nanum+Brush+Script&family=Nanum+Pen+Script&family=Gowun+Batang:wght@400;700&family=Dongle:wght@300;400;700&family=Gowun+Dodum&family=Song+Myung&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <main id="app">
    <div class="layer active" id="layer-a">
      <p class="quote-text"></p>
      <span class="quote-author"></span>
    </div>
    <div class="layer" id="layer-b">
      <p class="quote-text"></p>
      <span class="quote-author"></span>
    </div>
  </main>

  <button id="settings-btn" class="settings-btn">⚙️</button>

  <div id="settings-panel" class="settings-panel">
    <div class="settings-content">
      <h2>설정</h2>

      <!-- 카테고리 필터 (제일 위로!) -->
      <div class="settings-group">
        <label>카테고리 필터 (클릭하여 켜고 끄기)</label>
        <div id="category-pills" class="category-pills">
          <!-- JS에서 동적으로 버튼을 만들어줌 -->
        </div>
      </div>

      <!-- 글씨체 -->
      <div class="settings-group">
        <label>글씨체</label>
        <div class="font-buttons">
          <button data-font="'Noto Sans KR'" class="font-btn active">기본고딕</button>
          <button data-font="'Noto Serif KR'" class="font-btn">본명조(Bold)</button>
          <button data-font="'Black Han Sans'" class="font-btn">검은고딕</button>
          <button data-font="'Do Hyeon'" class="font-btn">도현체</button>
          <button data-font="'Nanum Brush Script'" class="font-btn">나눔브러쉬</button>
          <button data-font="'Nanum Pen Script'" class="font-btn">나눔펜</button>
          <button data-font="'Gowun Batang'" class="font-btn">고운바탕</button>
          <button data-font="'Dongle'" class="font-btn">동글체</button>
          <button data-font="'Gowun Dodum'" class="font-btn">고운돋움</button>
          <button data-font="'Song Myung'" class="font-btn">송명체</button>
        </div>
      </div>

      <!-- 배경 테마 -->
      <div class="settings-group">
        <label>배경 테마</label>
        <div class="color-palette">
          <button class="color-btn active" data-color="#000000" style="background: #000;" title="블랙"></button>
          <button class="color-btn" data-color="#1a1a2e" style="background: #1a1a2e;" title="네이비"></button>
          <button class="color-btn" data-color="#2d3436" style="background: #2d3436;" title="다크그레이"></button>
          <button class="color-btn" data-color="#2c3e50" style="background: #2c3e50;" title="미드나잇"></button>
          <button class="color-btn" data-color="#636e72" style="background: #636e72;" title="그레이"></button>
        </div>
      </div>

      <!-- 글씨 크기 -->
      <div class="settings-group">
        <label>글씨 크기</label>
        <div class="size-buttons">
          <button data-size="3" class="size-btn">작게</button>
          <button data-size="5" class="size-btn active">보통</button>
          <button data-size="7" class="size-btn">크게</button>
          <button data-size="9" class="size-btn">아주크게</button>
        </div>
      </div>

      <!-- 자동 전환 속도 -->
      <div class="settings-group">
        <label>자동 전환 속도</label>
        <div class="speed-buttons">
          <button data-speed="5000" class="speed-btn">5초</button>
          <button data-speed="10000" class="speed-btn">10초</button>
          <button data-speed="60000" class="speed-btn active">1분</button>
          <button data-speed="300000" class="speed-btn">5분</button>
        </div>
      </div>
    </div>
  </div>

  <div id="settings-backdrop" class="settings-backdrop"></div>

  <script src="js/quotes.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
